<template>
    <lightning-record-edit-form
        object-api-name="Opportunity"
        onsubmit={handleSubmit}
        onsuccess={handleSuccess}
        onerror={handleError}
    >
        <lightning-messages></lightning-messages>

        <lightning-input-field field-name="Name"></lightning-input-field>

        <lightning-input-field
            field-name="AccountId"
            onchange={handleAccountChange}
        ></lightning-input-field>

        <div class="slds-m-bottom_medium">
            <lightning-button
                label="Xem thông tin Account"
                icon-name="utility:new_window"
                icon-position="right"
                variant="neutral"
                disabled={isViewAccountDisabled}
                onclick={handleViewAccount}
            ></lightning-button>
        </div>

        <lightning-input-field field-name="StageName"></lightning-input-field>
        <lightning-input-field field-name="CloseDate"></lightning-input-field>
        <lightning-input-field field-name="Amount"></lightning-input-field>

        <div class="slds-m-top_medium slds-text-align_right">
            <lightning-button
                label="Hủy"
                class="slds-m-right_small"
                disabled={isLoading}
                onclick={handleCancel}
            ></lightning-button>
            <lightning-button
                type="submit"
                variant="brand"
                label="Lưu"
                disabled={isLoading}
            ></lightning-button>
        </div>

        <template if:true={isLoading}>
            <div class="slds-m-top_small">
                <lightning-spinner size="small" alternative-text="Đang lưu..."></lightning-spinner>
            </div>
        </template>
    </lightning-record-edit-form>
</template>
